<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Meu App de Táxi Profissional</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --cor-principal: #FFD700; 
            --cor-botao: #000000;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f5f5f5;
        }

        .header-busca {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            z-index: 1000;
        }

        .input-busca {
            width: 100%;
            padding: 15px 20px;
            border-radius: 30px;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        #map { width: 100%; flex: 1; z-index: 1; }

        .painel-viagem {
            background: white;
            padding: 20px;
            border-radius: 25px 25px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            z-index: 10;
            margin-top: -25px;
        }

        .titulo-painel {
            font-weight: bold;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            display: block;
        }

        .opcao-carro {
            display: flex;
            align-items: center;
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            margin-bottom: 12px;
        }

        .opcao-carro.selecionado {
            border-color: var(--cor-principal);
            background-color: #fffef0;
        }

        .carro-img { width: 55px; margin-right: 15px; }
        .info-carro { flex: 1; }
        .info-carro strong { display: block; font-size: 17px; }
        .info-carro span { color: #666; font-size: 13px; }
        .preco { font-weight: bold; font-size: 18px; }

        .btn-chamar {
            width: 100%;
            background-color: var(--cor-botao);
            color: #fff;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="header-busca">
        <input type="text" class="input-busca" placeholder="Para onde vamos?">
    </div>

    <div id="map"></div>

    <div class="painel-viagem">
        <span class="titulo-painel">Escolha sua viagem</span>
        
        <div class="opcao-carro selecionado">
            <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png" class="carro-img">
            <div class="info-carro">
                <strong>Táxi Econômico</strong>
                <span>4 min • Chegada 19:10</span>
            </div>
            <div class="preco">R$ 14,90</div>
        </div>

        <div class="opcao-carro">
            <img src="https://cdn-icons-png.flaticon.com/512/3202/3202926.png" class="carro-img">
            <div class="info-carro">
                <strong>Táxi Conforto</strong>
                <span>6 min • Chegada 19:12</span>
            </div>
            <div class="preco">R$ 22,50</div>
        </div>

        <button class="btn-chamar" onclick="solicitar()">Solicitar Viagem</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Coordenadas iniciais: Focando nas vias expressas de Brasília
        var latInicial = -15.793, lngInicial = -47.882;
        var map = L.map('map', { zoomControl: false }).setView([latInicial, lngInicial], 15);
        var marcadorDestino, linhaRota, marcadorUsuario;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Ícone clássico para o usuário ("Você está aqui")
        marcadorUsuario = L.marker([latInicial, lngInicial]).addTo(map).bindPopup('Você está aqui');


        // --- DEFININDO ÍCONES DE CARROS DE CORES DIFERENTES ---
        
        // Ícone Vermelho (Econômico)
        var iconeCarroVermelho = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png',
            iconSize: [32, 32], iconAnchor: [16, 16]
        });

        // Ícone Preto (Conforto)
        var iconeCarroPreto = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3202/3202926.png',
            iconSize: [36, 36], iconAnchor: [18, 18]
        });

        // Ícone Branco (Comum)
        var iconeCarroBranco = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/1048/1048314.png',
            iconSize: [32, 32], iconAnchor: [16, 16]
        });


        // --- ADICIONANDO MOTORISTAS EXATAMENTE NAS RUAS ---

        // Motorista 1: Vermelho na Via S1
        L.marker([-15.7940, -47.8830], {icon: iconeCarroVermelho}).addTo(map);

        // Motorista 2: Preto na Via N1
        L.marker([-15.7925, -47.8810], {icon: iconeCarroPreto}).addTo(map);

        // Motorista 3: Branco perto da Rodoviária
        L.marker([-15.7935, -47.8850], {icon: iconeCarroBranco}).addTo(map);


        map.on('click', function(e) {
            // Remove destino anterior
            if (marcadorDestino) map.removeLayer(marcadorDestino);
            if (linhaRota) map.removeLayer(linhaRota);
            
            // Ícone de destino
            var iconeDestino = L.icon({
                iconUrl: 'https://cdn-icons-png.flaticon.com/512/2776/2776067.png',
                iconSize: [40, 40],
                iconAnchor: [20, 40]
            });

            marcadorDestino = L.marker([e.latlng.lat, e.latlng.lng], {icon: iconeDestino}).addTo(map);
            map.flyTo([e.latlng.lat, e.latlng.lng], 15);

            // --- DESENHAR A LINHA AZUL DE ROTA ---
            // Simula uma rota do usuário até o destino
            var pontosRota = [
                marcadorUsuario.getLatLng(),
                marcadorDestino.getLatLng()
            ];
            
            linhaRota = L.polyline(pontosRota, {
                color: '#1a73e8', // Azul Google
                weight: 5,
                opacity: 0.7
            }).addTo(map);
        });

        function solicitar() {
            if(!marcadorDestino) {
                alert("Por favor, selecione o destino no mapa.");
            } else {
                alert("🚗 Motorista aceitou! Ele está no Toyota Corolla branco.");
            }
        }
    </script>
</body>
</html>
