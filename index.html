<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Meu App de Táxi Real</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --amarelo: #FFD700; --preto: #000; }
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #map { flex: 1; width: 100%; }
        
        .header-busca { position: absolute; top: 15px; width: 90%; left: 5%; z-index: 1000; }
        .input-busca { width: 100%; padding: 15px; border-radius: 25px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.2); outline: none; }

        .painel { background: white; padding: 20px; border-radius: 20px 20px 0 0; z-index: 10; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .opcao { display: flex; align-items: center; padding: 15px; border: 2px solid #eee; border-radius: 12px; margin-bottom: 10px; cursor: pointer; }
        .opcao.selecionada { border-color: var(--amarelo); background: #fffdf0; }
        .info { flex: 1; margin-left: 15px; }
        .preco { font-weight: bold; font-size: 18px; }
        .btn { width: 100%; background: var(--preto); color: white; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header-busca"><input type="text" class="input-busca" placeholder="Para onde vamos?"></div>
    <div id="map"></div>

    <div class="painel">
        <div id="eco" class="opcao selecionada" onclick="selecionar('eco', 2.50)">
            <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png" width="40">
            <div class="info"><strong>Econômico</strong><br><small>3 min</small></div>
            <div class="preco" id="preco-eco">R$ 0,00</div>
        </div>

        <div id="black" class="opcao" onclick="selecionar('black', 4.80)">
            <img src="https://cdn-icons-png.flaticon.com/512/3202/3202926.png" width="40">
            <div class="info"><strong>Black</strong><br><small>6 min</small></div>
            <div class="preco" id="preco-black">R$ 0,00</div>
        </div>
        <button class="btn" onclick="chamar()">Confirmar Viagem</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', {zoomControl: false}).setView([-5.52, -47.47], 13);
        var mUsuario, mDestino, rota, km = 0, taxa = 2.50;

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // BUSCAR LOCALIZAÇÃO REAL
        map.locate({setView: true, maxZoom: 16});
        map.on('locationfound', function(e) {
            mUsuario = L.marker(e.latlng).addTo(map).bindPopup("Você").openPopup();
            spawnCars(e.latlng); // Cria carros perto de você
        });

        function spawnCars(pos) {
            var icon = L.icon({iconUrl: 'https://cdn-icons-png.flaticon.com/512/744/744465.png', iconSize: [30,30]});
            for(i=0; i<3; i++) {
                L.marker([pos.lat + (Math.random()*0.01 - 0.005), pos.lng + (Math.random()*0.01 - 0.005)], {icon: icon}).addTo(map);
            }
        }

        map.on('click', function(e) {
            if(mDestino) map.removeLayer(mDestino);
            if(rota) map.removeLayer(rota);

            mDestino = L.marker(e.latlng).addTo(map);
            rota = L.polyline([mUsuario.getLatLng(), e.latlng], {color: '#1a73e8', weight: 5}).addTo(map);
            
            // CALCULAR DISTÂNCIA
            var dist = mUsuario.getLatLng().distanceTo(e.latlng) / 1000;
            km = dist;
            atualizarPrecos();
        });

        function selecionar(tipo, valor) {
            taxa = valor;
            document.querySelectorAll('.opcao').forEach(el => el.classList.remove('selecionada'));
            document.getElementById(tipo).classList.add('selecionada');
            atualizarPrecos();
        }

        function atualizarPrecos() {
            document.getElementById('preco-eco').innerText = "R$ " + (km * 2.5 + 5).toFixed(2);
            document.getElementById('preco-black').innerText = "R$ " + (km * 4.8 + 10).toFixed(2);
        }

        function chamar() { alert("Motorista a caminho!"); }
    </script>
</body>
</html>
